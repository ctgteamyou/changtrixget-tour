# กันเว็บ Render (แพ็กฟรี) หลับ — ยิง /api/health ทุก ~12 นาที
# repo เป็น public => GitHub Actions ฟรีไม่จำกัดนาที
# หมายเหตุ: เวลาของ schedule อาจคลาดเคลื่อน 5–15 นาทีตามคิวของ GitHub
#          และ GitHub จะปิด workflow อัตโนมัติถ้า repo ไม่มีความเคลื่อนไหว 60 วัน (กดเปิดใหม่ได้)

name: keepalive

on:
  schedule:
    - cron: "*/12 * * * *"
  workflow_dispatch: {}   # กดรันเองได้จากแท็บ Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint (wakes the instance)
        run: |
          echo "Pinging changtrixget-tour…"
          curl -fsS --max-time 90 https://changtrixget-tour.onrender.com/api/health || true
